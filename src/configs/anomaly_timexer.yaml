seed: 2026
paths:
  data_root: data
  results_root: results/anomaly/timexer
task: anomaly
dataset_name: PSM
anomaly:
  train_file: PSM/train.csv
  test_file: PSM/test.csv
  test_label_file: PSM/test_label.csv
  time_col: timestamp_(min)
  endo_cols: null
  exo_cols: []
  seq_len: 96
  stride: 8
  expected_freq: 1min
  normalize: robust
  threshold_mode: val_quantile
  threshold_quantile: 0.995
  val_ratio: 0.1
model:
  name: timexer
  input_dim: auto
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 128
  dropout: 0.1
  pooling: mean
  patch_len: 16
  patch_stride: 16
  patch_padding: 0
  n_globaltokens: 2
  attn_dropout: 0.0
  revin_affine: true
  revin_subtract_last: false
  tau_hidden_dim: 64
  tau_max: 20.0
  delta_clip: 10.0
train:
  batch_size: 64
  num_workers: 0
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  device: cpu
