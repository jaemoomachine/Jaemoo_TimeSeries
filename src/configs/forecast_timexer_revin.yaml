seed: 2026
paths:
  data_root: data
  results_root: results/forecast/timexer_revin
task: forecast
dataset_name: ETTh1
forecast:
  file_name: ETTh1.csv
  time_col: date
  target_cols:
  - OT
  feature_cols: null
  endo_cols:
  - OT
  exo_cols:
  - HUFL
  - HULL
  - MUFL
  - MULL
  - LUFL
  - LULL
  seq_len: 96
  pred_len: 96
  stride: 1
  expected_freq: 1h
  normalize: standard
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
model:
  name: timexer_revin
  input_dim: auto
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 128
  dropout: 0.1
  pooling: mean
  patch_len: 16
  patch_stride: 16
  patch_padding: 0
  n_globaltokens: 2
  attn_dropout: 0.0
  revin_affine: true
  revin_subtract_last: false
  tau_hidden_dim: 64
  tau_max: 20.0
  delta_clip: 10.0
train:
  batch_size: 32
  num_workers: 0
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  device: cpu
